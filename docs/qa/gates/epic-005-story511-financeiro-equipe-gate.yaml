  name: "Epic 005 — Story 5.11 (Onda E): Reformulação Equipe + Financeiro (dados reais)"
  stories: ["5.11"]
  type: warning            # soft-stop: aprovado com observações
  validator: "@qa (Quinn) · auditoria conduzida por @aiox-master (Orion)"
  date: "2026-06-29"
  version: 1.0
  verdict: CONCERNS        # PASS | CONCERNS | FAIL | WAIVED
  summary: >
    Abas Equipe e Financeiro reformuladas para o design dark/tabela e operando sobre dados REAIS do
    Epic 005 (view faturas, assinaturas, pedidos). KPIs, inadimplência assinatura-cêntrica, gestão de
    fatura (FaturaModal com cliente/produto/período), CSV, e histórico de atividades dentro do modal de
    edição. Gates estáticos verdes (tsc/eslint/build). Sem itens CRITICAL/HIGH. Observações de débito:
