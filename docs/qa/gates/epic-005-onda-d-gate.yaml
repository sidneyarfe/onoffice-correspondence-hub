# ---------------------------------------------------------------------------
# Issues (nenhum CRITICAL/HIGH bloqueante)
# ---------------------------------------------------------------------------
issues:
  - id: ISSUE-001
    severity: medium
    category: tests
    description: "Ausência de test runner — features financeiras críticas validadas só por gates estáticos + manual."
    recommendation: "Introduzir Vitest + testes de deriveClienteLifecycle/buildPeriodos/codigoFatura e fluxos de fatura (épico futuro de qualidade)."

  - id: ISSUE-002
    severity: medium
    category: infrastructure
    description: "E-mail de notificação depende da edge fn `enviar-notificacao` (não deployada) + RESEND_API_KEY. Hoje é no-op silencioso; interna funciona."
    recommendation: "@devops: `supabase functions deploy enviar-notificacao` + `supabase secrets set RESEND_API_KEY=...` (domínio verificado)."

  - id: ISSUE-003
    severity: medium
    category: requirements
    description: "CRM 'Iniciar contratação' (carrinho) não dispara mais o contrato ZapSign neste passo — contrato é enviado por assinatura na ficha. Mudança de comportamento."
    recommendation: "Confirmar com o usuário; se necessário, plugar `enviar-contrato` para a assinatura principal no submit do carrinho."

  - id: ISSUE-004
    severity: low
    category: code
    description: "Vínculo documento↔assinatura via token na `descricao` (`docPin`) em vez de coluna/FK."
    recommendation: "Story futura: adicionar `assinatura_id` a `documentos_cliente` (migração + regen types) e migrar o token."

  - id: ISSUE-005
    severity: low
    category: performance
    description: "Lifecycle por cliente derivado em bulk no client (2 queries) a cada fetch de clientes."
    recommendation: "Para escala, mover para uma VIEW/RPC agregada ou coluna persistida por job (alinha com 5.2/5.3)."

  - id: ISSUE-006
    severity: low
    category: code
    description: "Cache de módulo (em vez de TanStack Query) nos hooks de seção — risco de leve defasagem entre instâncias simultâneas (mitigado por realtime)."
    recommendation: "Story futura: migrar hooks de seção para useQuery (QueryClient já existe) com staleTime."

  - id: ISSUE-007
    severity: low
    category: security
    description: "Documentos de onboarding (contrato/comprovante) salvos no bucket PÚBLICO `documentos_fiscais`."
    recommendation: "Avaliar bucket privado + signed URLs para documentos sensíveis."

  - id: ISSUE-008
    severity: low
    category: ux
    description: "Kanban de Clientes ficou somente-leitura (drag removido); a lista (view) ainda mostra o status do funil, não o ciclo de vida."
    recommendation: "Follow-up: refletir o ciclo de vida também na lista; decidir se o board precisa de ações rápidas."

# ---------------------------------------------------------------------------
# Decisão
# ---------------------------------------------------------------------------
decision:
  outcome: "CONCERNS → aprovado; stories 5.7–5.10 marcadas Done."
  blocks_handoff: false
  follow_ups:
    - "Deploy de enviar-notificacao + RESEND_API_KEY (ISSUE-002) — @devops"
    - "Confirmar disparo de contrato no carrinho do CRM (ISSUE-003) — usuário/@pm"
    - "Backlog de débito: ISSUE-001/004/005/006/007/008"
  next_step: "Push/PR pelo @devops sob ordem do usuário (migrações já em prod)."
