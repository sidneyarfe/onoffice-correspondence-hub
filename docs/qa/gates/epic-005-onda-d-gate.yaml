# ---------------------------------------------------------------------------
# 7 verificações de qualidade (story-lifecycle.md · Fase 4)
# ---------------------------------------------------------------------------
checks:
  - id: 1-code-review
    name: "Revisão de código (padrões, legibilidade, manutenção)"
    result: PASS
    notes: >
      Reuso dos padrões existentes (modais dark, brand tokens on-lime/Work Sans, hooks use*). Modais
      intermediários consolidados (RegistrarEtapaModal/RegistrarPagamentoModal removidos → FaturaModal).
      Componentes coesos; sem `any` introduzido (1 `any` legado corrigido em NewCorrespondenceModal).

  - id: 2-unit-tests
    name: "Testes unitários (cobertura, verdes)"
    result: CONCERNS
    notes: "Projeto SEM test runner (npm test inexistente — restrição conhecida do épico). QA por gates estáticos + revisão manual."

  - id: 3-acceptance-criteria
    name: "Critérios de aceite atendidos"
    result: PASS
    notes: "Todos os ACs de 5.7–5.10 marcados ✅ e rastreáveis a arquivos no File List."

  - id: 4-regressions
    name: "Sem regressões"
    result: PASS
    notes: >
      `tsc --noEmit` limpo, `eslint` 0 errors (apenas warnings benignos: react-refresh em clienteStatus,
      exhaustive-deps pré-existentes), `npm run build` ✅ a cada wave. VIEWs de compat preservadas.

  - id: 5-performance
    name: "Performance dentro do aceitável"
    result: CONCERNS
    notes: >
      Cache de módulo elimina o recarregar ao navegar. Derivação de lifecycle faz +2 queries em bulk no
      fetch de clientes (OK na escala atual; ver ISSUE-005). Bundle > 500kB (warning pré-existente).

  - id: 6-security
    name: "Segurança (OWASP básico, RLS)"
    result: PASS
    notes: >
      Lacunas de RLS corrigidas por migração (admin write em pagamentos/documentos_cliente; admin read em
      atividades_cliente) usando is_admin(auth.uid()). Ações sensíveis (renovar/suspender/cancelar) e
      exclusão de documento exigem REAUTH/senha do admin. Segredos via Supabase secrets (RESEND/ZAPSIGN).

  - id: 7-documentation
    name: "Documentação atualizada"
    result: PASS
    notes: "Stories 5.7–5.10 criadas; epic-005 atualizado; memória de projeto atualizada."

